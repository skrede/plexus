name: CI

on:
  push:
    branches: [master, develop, 'milestone/**']
    paths-ignore: ['**/*.md', 'docs/**']
  pull_request:
    branches: [master, develop]
    paths-ignore: ['**/*.md', 'docs/**']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Tier the matrix by trigger to keep feedback fast where it matters — public CI minutes are free,
  # so this is a latency/signal choice, not a cost one. Milestone pushes (frequent WIP) get the
  # io_uring Linux leg only for quick signal; develop and develop PRs get the full Linux set; the
  # slower-to-schedule macOS and Windows legs ride the release path — a PR into master, a push to
  # master, or a manual dispatch. A doc-only change trips paths-ignore and never reaches here.
  select:
    name: select matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.tier.outputs.matrix }}
    steps:
      - id: tier
        shell: bash
        run: |
          linux_uring='{"id":"linux-gcc-uring","os":"ubuntu-24.04","liburing_from_source":"liburing-2.6"}'
          linux_gcc='{"id":"linux-gcc","os":"ubuntu-24.04"}'
          linux_clang='{"id":"linux-clang","os":"ubuntu-24.04","cc":"clang-18","cxx":"clang++-18"}'
          linux_all="$linux_gcc,$linux_clang,$linux_uring"
          cross='{"id":"mac-appleclang","os":"macos-15"},{"id":"mac-brewclang","os":"macos-15"},{"id":"win-msvc","os":"windows-2022","cc":"cl","cxx":"cl"},{"id":"win-clangcl","os":"windows-2022","cc":"clang-cl","cxx":"clang-cl"}'

          event='${{ github.event_name }}'
          ref='${{ github.ref }}'
          base='${{ github.base_ref }}'

          if [ "$event" = "workflow_dispatch" ]; then
            legs="$linux_all,$cross"
          elif [ "$event" = "pull_request" ] && [ "$base" = "master" ]; then
            legs="$linux_all,$cross"
          elif [ "$event" = "pull_request" ] && [ "$base" = "develop" ]; then
            legs="$linux_all"
          elif [ "$event" = "push" ] && [ "$ref" = "refs/heads/develop" ]; then
            legs="$linux_all"
          elif [ "$event" = "push" ] && [ "$ref" = "refs/heads/master" ]; then
            legs="$linux_all,$cross"
          elif [ "$event" = "push" ] && [ "${ref#refs/heads/milestone/}" != "$ref" ]; then
            legs="$linux_uring"
          else
            legs="$linux_uring"
          fi
          echo "matrix={\"include\":[$legs]}" >> "$GITHUB_OUTPUT"

  build-and-test:
    needs: select
    name: ${{ matrix.id }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.select.outputs.matrix) }}
    env:
      FETCHCONTENT_BASE_DIR: ${{ github.workspace }}/.deps
      CCACHE_DIR: ${{ github.workspace }}/.ccache
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: install linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y liburing-dev ccache clang-tidy

      # Ubuntu 24.04 ships liburing 2.5, which lacks io_uring_prep_futex_wait (added in 2.6). The
      # stock legs above exercise ring_notifier's threaded floor; this leg builds a newer liburing
      # into /usr/local (taking pkg-config precedence) so its configure probe selects the io_uring
      # futex-wait bridge. Pinned to a tag for reproducibility.
      - name: build liburing from source (futex-wait path)
        if: matrix.liburing_from_source
        run: |
          git clone --depth 1 --branch "${{ matrix.liburing_from_source }}" https://github.com/axboe/liburing.git /tmp/liburing
          cd /tmp/liburing
          ./configure --prefix=/usr/local
          make -j"$(nproc)"
          sudo make install
          sudo ldconfig

      - name: install macos dependencies
        if: runner.os == 'macOS'
        run: brew install ccache

      - name: set up windows developer environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0

      - name: cache fetched dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ github.workspace }}/.deps
          key: ${{ runner.os }}-${{ matrix.id }}-deps-${{ hashFiles('cmake/plexus-deps.cmake', 'tests/CMakeLists.txt') }}

      - name: cache compiler objects
        if: runner.os == 'Linux' || runner.os == 'macOS'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ github.workspace }}/.ccache
          key: ${{ runner.os }}-${{ matrix.id }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.id }}-ccache-

      - name: configure
        if: runner.os == 'Linux'
        run: |
          if [ -n "${{ matrix.cc }}" ]; then export CC="${{ matrix.cc }}" CXX="${{ matrix.cxx }}"; fi
          if [ -n "${{ matrix.liburing_from_source }}" ]; then export PKG_CONFIG_PATH="/usr/local/lib/pkgconfig:${PKG_CONFIG_PATH}"; fi
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DPLEXUS_ENABLE_ASIO_BACKEND=ON -DPLEXUS_ENABLE_SHM_BACKEND=ON \
            -DPLEXUS_ENABLE_CRYPTO_BACKEND=ON \
            -DPLEXUS_BUILD_TESTS=ON -DPLEXUS_BUILD_EXAMPLES=ON \
            -DPLEXUS_BUILD_MCAP_TRANSCODE=ON -DPLEXUS_BUILD_PCAP_TRANSCODE=ON \
            -DPLEXUS_BUILD_BENCHMARKS=OFF -DPLEXUS_BUILD_FUZZ_TESTS=OFF \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: configure
        if: runner.os == 'macOS'
        run: |
          EXTRA=()
          if [ "${{ matrix.id }}" = "mac-brewclang" ]; then
            EXTRA+=("-DCMAKE_CXX_COMPILER=$(brew --prefix llvm@18)/bin/clang++")
          fi
          cmake -S . -B build -G Ninja \
            -DPLEXUS_ENABLE_ASIO_BACKEND=ON -DPLEXUS_ENABLE_SHM_BACKEND=ON \
            -DPLEXUS_ENABLE_CRYPTO_BACKEND=ON -DOPENSSL_ROOT_DIR="$(brew --prefix openssl@3)" \
            -DPLEXUS_BUILD_TESTS=ON -DPLEXUS_BUILD_EXAMPLES=ON \
            -DPLEXUS_BUILD_MCAP_TRANSCODE=ON -DPLEXUS_BUILD_PCAP_TRANSCODE=ON \
            -DPLEXUS_BUILD_BENCHMARKS=OFF -DPLEXUS_BUILD_FUZZ_TESTS=OFF \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            "${EXTRA[@]}"

      - name: configure
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_C_COMPILER="${{ matrix.cc }}" -DCMAKE_CXX_COMPILER="${{ matrix.cxx }}" \
            -DPLEXUS_ENABLE_ASIO_BACKEND=ON -DPLEXUS_ENABLE_SHM_BACKEND=ON \
            -DPLEXUS_ENABLE_CRYPTO_BACKEND=OFF \
            -DPLEXUS_BUILD_TESTS=ON -DPLEXUS_BUILD_EXAMPLES=ON \
            -DPLEXUS_BUILD_BENCHMARKS=OFF -DPLEXUS_BUILD_FUZZ_TESTS=OFF

      - name: build
        run: cmake --build build --parallel 4

      # The real-multicast-loopback discovery tests cannot run on the GitHub macOS or Windows runners:
      # macOS 15 blocks multicast for the unprivileged runner process (Local Network Privacy;
      # actions/runner-images#10924) and loopback multicast is broken on Darwin 24+, and the Windows
      # loopback adapter does not carry multicast traffic. Linux runs the full suite; the non-Linux
      # runners drop the live-multicast label. The tests stay available on capable local machines.
      - name: test
        if: runner.os == 'Linux'
        run: ctest --test-dir build --output-on-failure

      - name: test (macOS/Windows exclude live-multicast)
        if: runner.os != 'Linux'
        run: ctest --test-dir build --output-on-failure --label-exclude live-multicast

  # Coverage is informational (see codecov.yml) — a single gcc leg is enough signal. Skipped on
  # milestone pushes to keep WIP feedback fast; runs on develop, master, PRs, and dispatch.
  coverage:
    name: coverage
    runs-on: ubuntu-24.04
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/heads/milestone/')
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y liburing-dev gcc-14 g++-14
          pip install gcovr

      - name: configure
        env:
          CC: gcc-14
          CXX: g++-14
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="--coverage" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage" \
            -DPLEXUS_ENABLE_ASIO_BACKEND=ON -DPLEXUS_ENABLE_SHM_BACKEND=ON \
            -DPLEXUS_ENABLE_CRYPTO_BACKEND=ON \
            -DPLEXUS_BUILD_TESTS=ON

      - name: build
        run: cmake --build build --parallel 4

      - name: test
        run: ctest --test-dir build --output-on-failure

      - name: generate coverage report
        run: |
          gcovr build --root . \
            --gcov-executable gcov-14 \
            --filter 'lib/plexus-.*/include/' \
            --filter 'backends/plexus-.*/(include|src)/' \
            --exclude 'lib/plexus-testing/' \
            --gcov-ignore-errors=source_not_found \
            --xml coverage.xml

      - name: upload coverage to codecov
        uses: codecov/codecov-action@fdcc8476540edceab3de004e990f80d881c6cc00 # v5.5.0
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
