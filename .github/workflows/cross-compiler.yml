name: cross-compiler

on:
  push:
    branches: [master, develop, 'milestone/**']
  pull_request:
    branches: [master, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.id }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux-gcc
            os: ubuntu-24.04
          - id: linux-clang
            os: ubuntu-24.04
            cc: clang-18
            cxx: clang++-18
          - id: mac-appleclang
            os: macos-15
          - id: mac-brewclang
            os: macos-15
          - id: win-msvc
            os: windows-2022
            cc: cl
            cxx: cl
          - id: win-clangcl
            os: windows-2022
            cc: clang-cl
            cxx: clang-cl
    env:
      FETCHCONTENT_BASE_DIR: ${{ github.workspace }}/.deps
      CCACHE_DIR: ${{ github.workspace }}/.ccache
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: install linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y liburing-dev ccache clang-tidy

      - name: install macos dependencies
        if: runner.os == 'macOS'
        run: brew install ccache

      - name: set up windows developer environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0

      - name: cache fetched dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ github.workspace }}/.deps
          key: ${{ runner.os }}-${{ matrix.id }}-deps-${{ hashFiles('cmake/plexus-deps.cmake', 'tests/CMakeLists.txt') }}

      - name: cache compiler objects
        if: runner.os == 'Linux' || runner.os == 'macOS'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ github.workspace }}/.ccache
          key: ${{ runner.os }}-${{ matrix.id }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.id }}-ccache-

      - name: configure
        if: runner.os == 'Linux'
        run: |
          if [ -n "${{ matrix.cc }}" ]; then export CC="${{ matrix.cc }}" CXX="${{ matrix.cxx }}"; fi
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DPLEXUS_ENABLE_ASIO_BACKEND=ON -DPLEXUS_ENABLE_SHM_BACKEND=ON \
            -DPLEXUS_ENABLE_CRYPTO_BACKEND=ON \
            -DPLEXUS_BUILD_TESTS=ON -DPLEXUS_BUILD_EXAMPLES=ON \
            -DPLEXUS_BUILD_MCAP_TRANSCODE=ON -DPLEXUS_BUILD_PCAP_TRANSCODE=ON \
            -DPLEXUS_BUILD_BENCHMARKS=OFF -DPLEXUS_BUILD_FUZZ_TESTS=OFF \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: configure
        if: runner.os == 'macOS'
        run: |
          EXTRA=()
          if [ "${{ matrix.id }}" = "mac-brewclang" ]; then
            EXTRA+=("-DCMAKE_CXX_COMPILER=$(brew --prefix llvm@18)/bin/clang++")
          fi
          cmake -S . -B build -G Ninja \
            -DPLEXUS_ENABLE_ASIO_BACKEND=ON -DPLEXUS_ENABLE_SHM_BACKEND=ON \
            -DPLEXUS_ENABLE_CRYPTO_BACKEND=ON -DOPENSSL_ROOT_DIR="$(brew --prefix openssl@3)" \
            -DPLEXUS_BUILD_TESTS=ON -DPLEXUS_BUILD_EXAMPLES=ON \
            -DPLEXUS_BUILD_MCAP_TRANSCODE=ON -DPLEXUS_BUILD_PCAP_TRANSCODE=ON \
            -DPLEXUS_BUILD_BENCHMARKS=OFF -DPLEXUS_BUILD_FUZZ_TESTS=OFF \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            "${EXTRA[@]}"

      - name: configure
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_C_COMPILER="${{ matrix.cc }}" -DCMAKE_CXX_COMPILER="${{ matrix.cxx }}" \
            -DPLEXUS_ENABLE_ASIO_BACKEND=ON -DPLEXUS_ENABLE_SHM_BACKEND=ON \
            -DPLEXUS_ENABLE_CRYPTO_BACKEND=OFF \
            -DPLEXUS_BUILD_TESTS=ON -DPLEXUS_BUILD_EXAMPLES=ON \
            -DPLEXUS_BUILD_BENCHMARKS=OFF -DPLEXUS_BUILD_FUZZ_TESTS=OFF

      - name: build
        run: cmake --build build --parallel 4

      - name: test
        run: ctest --test-dir build --output-on-failure
